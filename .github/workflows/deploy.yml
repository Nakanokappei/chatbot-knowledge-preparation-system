name: Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-northeast-1
  ECR_REGISTRY: 444332185803.dkr.ecr.ap-northeast-1.amazonaws.com
  APP_IMAGE: ckps-app
  WORKER_IMAGE: ckps-worker

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # PHP Tests
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, mbstring

      - name: Install PHP dependencies
        working-directory: app
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        working-directory: app
        run: vendor/bin/phpstan analyse --level=5 app/Http app/Models app/Services || true

      # Python Tests
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        working-directory: worker
        run: pip install -r requirements.txt flake8

      - name: Run flake8
        working-directory: worker
        run: flake8 src/ --max-line-length=120 --ignore=E501,W503

  build-push:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push app image
        working-directory: app
        run: |
          docker build -t $ECR_REGISTRY/$APP_IMAGE:${{ github.sha }} -t $ECR_REGISTRY/$APP_IMAGE:latest .
          docker push $ECR_REGISTRY/$APP_IMAGE:${{ github.sha }}
          docker push $ECR_REGISTRY/$APP_IMAGE:latest

      - name: Build and push worker image
        working-directory: worker
        run: |
          docker build -t $ECR_REGISTRY/$WORKER_IMAGE:${{ github.sha }} -t $ECR_REGISTRY/$WORKER_IMAGE:latest .
          docker push $ECR_REGISTRY/$WORKER_IMAGE:${{ github.sha }}
          docker push $ECR_REGISTRY/$WORKER_IMAGE:latest

  deploy-staging:
    needs: build-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to staging
        run: |
          ./scripts/deploy.sh staging ${{ github.sha }}

      - name: Smoke test staging
        run: |
          sleep 30
          curl -sf https://staging.ckps.example.com/up || exit 1
          echo "Staging health check passed"

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to production
        run: |
          ./scripts/deploy.sh production ${{ github.sha }}

      - name: Verify production
        run: |
          sleep 30
          curl -sf https://ckps.example.com/up || exit 1
          echo "Production health check passed"
